<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Highlight Studio</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="studio-shell">
    <section class="hero">
      <div>
        <p class="eyebrow">Independent Video Studio</p>
        <h1>Highlight Studio</h1>
        <p>사진을 올리고, 영상 생성 버튼을 누르면 바로 MP4 하이라이트를 만듭니다.</p>
      </div>
      <div class="status-pill" id="serverStatus">localhost:4000</div>
    </section>

    <section class="workflow" aria-label="영상 제작 단계">
      <div class="step is-active"><strong>1</strong><span>사진 업로드</span></div>
      <div class="step"><strong>2</strong><span>영상 생성</span></div>
      <div class="step"><strong>3</strong><span>MP4 다운로드</span></div>
    </section>

    <section class="panel upload-panel">
      <div class="panel-head">
        <div>
          <h2>사진 업로드</h2>
          <p>JPG, PNG, WEBP 사진을 선택하세요. 최대 100장까지 처리합니다.</p>
        </div>
        <label class="file-button">
          사진 선택
          <input id="photoInput" type="file" accept="image/jpeg,image/png,image/webp" multiple>
        </label>
      </div>

      <div class="settings-row">
        <label>영상 제목
          <input id="titleInput" type="text" value="태권도 하이라이트" maxlength="80">
        </label>
        <label>사진당 시간
          <select id="secondsInput">
            <option value="1">1초</option>
            <option value="2" selected>2초</option>
            <option value="3">3초</option>
            <option value="4">4초</option>
          </select>
        </label>
      </div>

      <div class="preview-info">
        <strong id="photoCount">사진 0장</strong>
        <span id="photoSize">선택된 파일 없음</span>
      </div>
      <div id="previewGrid" class="preview-grid"></div>
    </section>

    <section class="panel action-panel">
      <div>
        <h2>영상 생성</h2>
        <p id="message">사진을 선택하면 MP4 생성을 시작할 수 있습니다.</p>
      </div>
      <button id="generateButton" class="primary-button" type="button" disabled>영상 생성</button>
      <a id="downloadButton" class="download-button is-hidden" href="#" download>MP4 다운로드</a>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
